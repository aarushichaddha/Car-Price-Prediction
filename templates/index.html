<!DOCTYPE html>
<html>

<head>

<title>Car Price Prediction</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>Car Price Prediction</h1>

<form action="/predict" method="POST">

<label>Car Age</label>

<input type="number" name="age" required>

<label>Present Price</label>

<input type="number" step="0.1" name="present_price" required>

<label>Driven Kilometers</label>

<input type="number" name="kms" required>

<label>Owner</label>

<input type="number" name="owner" required>

<label>Fuel Type</label>

<select name="fuel">

<option>Petrol</option>

<option>Diesel</option>

<option>CNG</option>

</select>

<label>Seller Type</label>

<select name="seller">

<option>Individual</option>

<option>Dealer</option>

</select>

<label>Transmission</label>

<select name="transmission">

<option>Manual</option>

<option>Automatic</option>

</select>

<input type="submit" value="Predict">

</form>

{% if prediction %}

<h2>Predicted Price : {{prediction}} Lakhs</h2>

{% endif %}

</body>

</html>
